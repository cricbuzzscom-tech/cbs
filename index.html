<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricbuzzs</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#080808;color:#fff;text-align:center}
.hero{
  min-height:100vh;
  background:linear-gradient(rgba(0,0,0,.75),rgba(90,0,0,.85)),
  url('https://images.unsplash.com/photo-1531415074968-036ba1b575da?auto=format&fit=crop&w=1400&q=80');
  background-size:cover;background-position:center;
  display:flex;align-items:center;justify-content:center;padding:25px
}
.card{
  max-width:430px;width:100%;
  background:rgba(0,0,0,.72);
  border:2px solid #b40018;
  border-radius:22px;
  padding:30px 22px;
  box-shadow:0 0 30px #b40018
}
.logo{font-size:42px;font-weight:900}
.logo span{color:#12d6c9}
h1{margin:18px 0 8px;font-size:30px;color:#fff}
p{color:#ddd;font-size:16px;line-height:1.5}
.btn{
  display:block;margin:18px auto;padding:16px;
  border-radius:14px;text-decoration:none;
  font-size:20px;font-weight:800;color:#fff
}
.web{background:#b40018}
.wa{background:#12a855}
.footer{font-size:13px;color:#aaa;margin-top:18px}
</style>
</head>
<body>

<div class="hero">
  <div class="card">
    <div class="logo">cricbuzz<span>s</span></div>

    <h1>Cricket Updates & Schedule</h1>
    <p>Daily cricket schedule, match updates and sports information in one place.</p>

    <a class="btn web" href="https://cricbuzzs.com/" target="_blank">🌐 Open Website</a>

    <a class="btn wa" href="https://wa.me/919999999999" target="_blank">💬 Chat on WhatsApp</a>

    <div class="footer">© 2026 Cricbuzzs • 18+ Responsible Use</div>
  </div>
</div>

</body>
</html>
